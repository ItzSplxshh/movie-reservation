# Local secrets are loaded from application-local.properties (gitignored)
spring.config.import=optional:application-local.properties

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/movie_reservation?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=REPLACE_ME
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=REPLACE_ME
app.jwt.expiration=86400000

# Stripe
stripe.api.key=REPLACE_ME
stripe.webhook.secret=REPLACE_ME

# CORS
app.cors.allowed-origins=http://localhost:3000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=REPLACE_ME
spring.mail.password=REPLACE_ME
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Redis Cache Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=60000

# Super Admin default credentials
app.superadmin.email=admin@cinevault.com
app.superadmin.password=Admin@123


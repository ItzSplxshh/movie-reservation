version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: cinevault-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: movie_reservation
      MYSQL_USER: cinevault
      MYSQL_PASSWORD: cinevault123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cinevault-redis
    ports:
      - "6380:6379"

  # Spring Boot Backend
  backend:
    build: ./backend
    container_name: cinevault-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/movie_reservation?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: cinevault
      SPRING_DATASOURCE_PASSWORD: cinevault123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # React Frontend
  frontend:
    build: ./frontend
    container_name: cinevault-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data: